<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test - Inventory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-100 text-center">
        <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Finalizing Setup</h1>
        <p class="text-slate-600 mb-6 font-medium">Environment is active. Synchronizing assets<span class="loading-dots"></span></p>
        
        <div class="bg-amber-50 border border-amber-100 rounded-lg p-4 text-left mb-6">
            <h3 class="text-sm font-semibold text-amber-800 mb-1">Action Required:</h3>
            <p class="text-xs text-amber-700 leading-relaxed">
                The server is ready, but the React bundle hasn't been generated yet. 
                Please run the following in your cPanel Terminal:
            </p>
            <code class="block bg-white/50 p-2 mt-2 rounded text-[10px] font-mono text-slate-800 border border-amber-200">
                npm install --production=false && npm run build
            </code>
        </div>
        
        <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">test Inventory Management</p>
    </div>
</body>
</html>
